<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nova Viagem</title>
    <meta charset="UTF-8">
</head>
<body>

<h2>Cadastro de Viagem</h2>

<form th:action="@{/viagens/novo}" th:object="${viagem}" method="post">

    <label>Veículo:</label>
    <select th:field="*{idVeiculo}">

        <option th:value="''">Selecione</option>
        <option th:each="v : ${veiculos}"
                th:value="${v.id}"
                th:text="${v.placa}">
        </option>
    </select>

    <br><br>

    <label>Origem:</label>
    <input type="text" th:field="*{origem}" />

    <br><br>

    <label>Destino:</label>
    <input type="text" th:field="*{destino}" />

    <br><br>

    <label>Data de Início:</label>
    <label>
        <input type="datetime-local" th:field="*{dataSaida}" />
    </label>

    <br><br>
    <button type="submit">Salvar</button>

</form>

</body>
</html>
